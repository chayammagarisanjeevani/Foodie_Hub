<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logged Out - Foodie</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff4d4d,#ff7a59);
}

.logout-container{
    width:500px;
    background:white;
    padding:50px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.icon{
    font-size:80px;
    margin-bottom:20px;
}

h1{
    color:#ef4f5f;
    margin-bottom:15px;
}

p{
    color:#666;
    font-size:18px;
    line-height:1.6;
    margin-bottom:30px;
}

.btn{
    display:inline-block;
    text-decoration:none;
    background:#ef4f5f;
    color:white;
    padding:14px 35px;
    border-radius:30px;
    font-size:18px;
    transition:.3s;
}

.btn:hover{
    background:#d63f50;
}

</style>
</head>
<body>

<div class="logout-container">

    <div class="icon">🍽️</div>

    <h1>Successfully Logged Out</h1>

    <p>
        Thank you for using Foodie.
        We hope to serve you again soon.
    </p>

    <a href="home.jsp" class="btn">
        Back to Home
    </a>

</div>

</body>
</html>
